<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0369a1"/>

  <!-- Wave body: rises from bottom-left, peaks and curls at top-right -->
  <path
    d="M3 29 Q5 21 11 17 Q17 13 19 8 Q21 3 25 4 Q29 5 28 9 Q27 13 23 15 Q19 17 17 21 Q14 25 10 29 Z"
    fill="#38bdf8"
  />

  <!-- Wave face highlight -->
  <path
    d="M11 17 Q17 13 19 8 Q21 3 25 4 Q29 5 28 9 Q27 13 23 15 Q19 17 16 20 Q13 23 11 22 Q9 20 11 17 Z"
    fill="#7dd3fc"
  />

  <!-- Curl / lip of the breaking wave -->
  <path
    d="M19 7 Q23 1 27 4 Q31 7 28 11 Q27 8 24 8 Q21 8 20 6 Z"
    fill="#bae6fd"
  />

  <!-- White foam spray at the tip -->
  <path
    d="M26 3 Q30 4 30 8"
    stroke="white"
    stroke-width="1.5"
    fill="none"
    stroke-linecap="round"
    opacity="0.85"
  />
</svg>
